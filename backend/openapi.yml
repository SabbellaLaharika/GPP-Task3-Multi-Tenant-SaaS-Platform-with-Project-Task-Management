openapi: 3.0.0
info:
  title: Multi-Tenant SaaS Platform API
  version: 1.0.0
  description: >-
    API documentation for the Multi-Tenant SaaS Platform with Project & Task
    Management. Fully complies with the 19 API endpoints requirement and the
    {success, message, data} uniform response format.
servers:
  - url: http://localhost:5000/api
    description: Local Development Server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    BadRequest:
      description: Bad Request (e.g., Validation Error)
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Invalid input data or validation failed
    Unauthorized:
      description: Unauthorized (Token missing or invalid)
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Unauthorized access
    Forbidden:
      description: Forbidden (Insufficient permissions)
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: 'Forbidden: You do not have permission'
    NotFound:
      description: Resource Not Found
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Resource not found
    Conflict:
      description: Conflict (e.g., Resource already exists)
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: 'Conflict: Resource already exists'
    ServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Internal server error
security:
  - bearerAuth: []
tags:
  - name: Auth
    description: Authentication APIs (4)
  - name: Tenants
    description: Tenant Management APIs (3)
  - name: Users
    description: User Management APIs (4)
  - name: Projects
    description: Project Management APIs (4)
  - name: Tasks
    description: Task Management APIs (5)
paths:
  /auth/register-tenant:
    post:
      summary: 1. Register a new tenant
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tenantName
                - subdomain
                - adminEmail
                - adminPassword
                - adminFullName
              properties:
                tenantName:
                  type: string
                  example: Test Company Alpha
                subdomain:
                  type: string
                  example: testalpha
                adminEmail:
                  type: string
                  format: email
                  example: admin@testalpha.com
                adminPassword:
                  type: string
                  example: TestPass@123
                adminFullName:
                  type: string
                  example: Alpha Admin
      responses:
        '201':
          description: Tenant registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Tenant registered successfully
                  data:
                    type: object
                    properties:
                      tenantId:
                        type: string
                        example: uuid
                      subdomain:
                        type: string
                        example: value
                      adminUser:
                        type: object
                        properties:
                          id:
                            type: string
                            example: uuid
                          email:
                            type: string
                            example: value
                          fullName:
                            type: string
                            example: value
                          role:
                            type: string
                            example: tenant_admin
        '400':
          description: Validation errors
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Validation failed
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                          example: adminEmail
                        message:
                          type: string
                          example: Invalid email format
        '409':
          description: Subdomain or email already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Subdomain or email already exists
  /auth/login:
    post:
      summary: 2. Login to the system
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: admin@demo.com
                password:
                  type: string
                  example: Demo@123
                tenantSubdomain:
                  type: string
                  example: demo
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Login successful
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                            example: bbbbbbbb-bbbb-bbbb
                          email:
                            type: string
                            example: admin@demo.com
                          fullName:
                            type: string
                            example: Demo Admin
                          role:
                            type: string
                            example: tenant_admin
                          tenantId:
                            type: string
                            format: uuid
                            example: 22222222-2222-2222
                      token:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                      expiresIn:
                        type: string
                        example: 86400
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /auth/me:
    get:
      summary: 3. Get current logged-in user
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: User details fetched successfully
                  data:
                    type: object
                    properties:
                      id:
                        type: uuid
                        example: bbbbbbbb-bbbb-bbbb
                      email:
                        type: string
                        example: admin@demo.com
                      fullName:
                        type: string
                        example: Demo Admin
                      role:
                        type: string
                        example: tenant_admin
                      isActive:
                        type: boolean
                        example: true
                      tenant:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                            example: 22222222-2222-2222
                          name:
                            type: string
                            example: Demo Company
                          subdomain:
                            type: string
                            example: demo
                          subscriptionPlan:
                            type: string
                            example: free
                          maxUsers:
                            type: integer
                            example: 5
                          maxProjects:
                            type: integer
                            example: 3
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /auth/logout:
    post:
      summary: 4. Logout user
      tags:
        - Auth
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Logged out successfully
  /tenants/{tenantId}:
    get:
      summary: 5. Get tenant details
      tags:
        - Tenants
      parameters:
        - in: path
          name: tenantId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tenant details retrieval
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Tenant details retrieved successfully
                  data:
                    type: object
                    properties:
                      id:
                        type: uuid
                        example: '22222222'
                      name:
                        type: string
                        example: Demo Company
                      subdomain:
                        type: string
                        example: demo
                      status:
                        type: string
                        example: active
                      subscriptionPlan:
                        type: string
                        example: pro
                      maxUsers:
                        type: integer
                        example: 15
                      maxProjects:
                        type: integer
                        example: 100
                      createdAt:
                        type: timestamp
                        example: '2024-12-26T10:00:00.000Z'
                      stats:
                        type: object
                        properties: 
                          totalUsers:
                            type: integer
                            example: 5
                          totalProjects:
                            type: integer
                            example: 3
                          totalTasks:
                            type: integer
                            example: 15
                      
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: 6. Update tenant details
      tags:
        - Tenants
      parameters:
        - in: path
          name: tenantId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Updated Project via Swagger
      responses:
        '200':
          description: Tenant updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Tenant updated successfully
                  data:
                    type: object
                    properties:
                      id:
                        type: uuid
                        example: '2222'
                      name:
                        type: string
                        example: Updated Project via Swagger
                      updatedAt:
                        type: timestamp
                        example: '2024-12-26T10:00:00.000Z'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'
  /tenants:
    get:
      summary: 7. List all tenants (Super Admin Only)
      tags:
        - Tenants
      responses:
        '200':
          description: List of tenants
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      tenants:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              example: '1111'
                            name:
                              type: string
                              example: Demo Company
                            subdomain:
                              type: string
                              example: demo
                            status:
                              type: string
                              example: active
                            subscriptionPlan:
                              type: string
                              example: professional
                            totalUsers:
                              type: number
                              example: 3
                            totalProjects:
                              type: number
                              example: 2
                            createdAt:
                              type: timestamp
                              example: '2024-12-26T10:00:00.000Z'
        '403':
          $ref: '#/components/responses/Forbidden'
  /tenants/{tenantId}/users:
    post:
      summary: 8. Create User
      tags:
        - Users
      parameters:
        - in: path
          name: tenantId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - fullName
                - role
              properties:
                email:
                  type: string
                  example: newuser@demo.com
                password:
                  type: string
                  example: NewUser@123
                fullName:
                  type: string
                  example: New User from Swagger
                role:
                  type: string
                  example: user
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: User created successfully
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: user-id-uuid
                      email:
                        type: string
                        example: newuser@demo.com
                      fullName:
                        type: string
                        example: New User from Swagger
                      role:
                        type: string
                        example: user
                      tenantId:
                        type: string
                        example: 22222222-2222
                      isActive:
                        type: boolean
                        example: true
                      createdAt:
                        type: timestamp
                        example: 2026-03-04T00:00:00.000Z
                      
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      summary: 9. List Users
      tags:
        - Users
      parameters:
        - in: path
          name: tenantId
          required: true
          schema:
            type: string
        - in: query
          name: search
          required: false
          schema :
            type: string
        - in: query
          name: role
          required: false
          schema :
            type: string
            enum: ["tenant_admin", "user"]
        - in: query
          name: page
          required: false
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 50 
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Users fetched successfully
                  data:
                    type: object
                    properties:
                      users:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              example: user-id-uuid
                            email:
                              type: string
                              example: admin@demo.com
                            fullName:
                              type: string
                              example: Demo Admin
                            role:
                              type: string
                              example: tenant_admin
                            isActive:
                              type: boolean
                              example: true
                            createdAt:
                              type: timestamp
                              example: '2024-12-26T10:00:00.000Z'
                      total:
                        type: integer
                        example: 5
                      pagination:
                        type: object
                        properties:
                          currentPage:
                            type: integer
                            example: 1
                          totalPages:
                            type: integer
                            example: 1
                          limit:
                            type: integer
                            example: 50
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /users/{userId}:
    put:
      summary: 10. Update User
      tags:
        - Users
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                  example: Updated User Name
                role:
                  type: enum
                  enum: ["tenant_admin", "user"]
                  example: tenant_admin
                isActive:
                  type: boolean
                  example: true
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: User updated successfully
                  data:
                    type: object
                    properties:
                      id:
                        type: uuid
                        example: user-uuid
                      fullName:
                        type: string
                        example: Updated User Name
                      role:
                        type: string
                        enum: ["tenant_admin", "user"]
                        example: tenant_admin
                      updatedAt:
                        type: timestamp
                        example: 2024-12-26T10:00:00.000Z
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: 11. Delete User
      tags:
        - Users
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: User deleted successfully
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects:
    post:
      summary: 12. Create Project
      tags:
        - Projects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: Swagger Test Project
                description:
                  type: string
                  example: This project was created via Swagger testing
                status:
                  type: enum
                  enum: ["active", "archieved", "completed"]
                  example: active
      responses:
        '201':
          description: Project created 
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Project created successfully
                  data:
                    type: object
                    properties:
                      id:
                        type: uuid
                        example: project-uuid
                      tenantId:
                        type: uuid
                        example: tenant-uuid
                      name:
                        type: string
                        example: Swagger Test Project
                      description:
                        type: string
                        example: This project was created via Swagger testing
                      status:
                        type: enum
                        enum: ["active", "archieved", "completed"]
                        example: active
                      createdBy:
                        type: uuid
                        example: creator-uuid
                      createdAt:
                        type: timestamp
                        example: 2024-12-27T08:00:00.000Z
        '403':
          $ref: '#/components/responses/Forbidden'
    get:
      summary: 13. List Projects
      tags:
        - Projects
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      projects:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: uuid
                              example: project-uuid
                            name:
                              type: string
                              example: Swagger Test Project
                            description:
                              type: string
                              example: This project was created via Swagger testing
                            status:
                              type: string
                              example: active
                            createdBy:
                              type: object
                              properties:
                                id:
                                  type: uuid
                                  example: creator-uuid
                                fullName:
                                  type: string
                                  example: Demo Admin
                            taskCount:
                              type: integer
                              example: 5
                            completedTaskCount:
                              type: integer
                              example: 2
                            createdAt:
                              type: timestamp
                              example: 2024-12-27T08:00:00.000Z
                      total:
                        type: integer
                        example: 2
                      pagination:
                        type: object
                        properties:
                          currentPage:
                            type: integer
                            example: 1
                          totalPages:
                            type: integer
                            example: 1
                          limit:
                            type: integer
                            example: 20
  /projects/{projectId}:
    put:
      summary: 14. Update Project
      tags:
        - Projects
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Updated Project Name
                description:
                  type: string
                  example: Updated description via Postman
                status:
                  type: string
                  example: archived
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Project updated successfully
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: project-uuid
                      name:
                        type: string
                        example: Updated Project Name
                      description:
                        type: string
                        example: Updated description via Postman
                      status:
                        type: string
                        example: archived
                      updatedAt:
                        type: timestamp
                        example: 2024-12-27T08:00:00.000Z
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: 15. Delete Project
      tags:
        - Projects
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Project deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Project deleted successfully
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{projectId}/tasks:
    post:
      summary: 16. Create Task
      tags:
        - Tasks
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                  example: Test Task from Swagger
                description:
                  type: string
                  example: This is a test task created via Swagger
                priority:
                  type: string
                  example: high
                assignedTo:
                  type: string
                  nullable: true
                  example: null
                dueDate:
                  type: string
                  format: date
                  example: '2025-01-15'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Task created successfully
                  data:
                    type: object
                    properties:
                      id:
                        type: uuid
                        example: task-uuid
                      projectId:
                        type: uuid
                        example: project-uuid
                      tenantId:
                        type: uuid
                        example: tenant-uuid
                      title:
                        type: string
                        example: Test Task from Swagger
                      description:
                        type: string
                        example: This is a test task created via Swagger
                      status:
                        type: enum
                        enum: [todo, in_progress, done]
                        example: todo
                      priority:
                        type: enum
                        enum: [low, medium, high]
                        example: medium
                      assignedTo:
                        type: uuid
                        nullable: true
                        example: null
                      dueDate:
                        type: string
                        example: '2025-01-15'
                      createdAt:
                        type: timestamp
                        example: '2024-12-27T08:00:00.000Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
    get:
      summary: 17. List Tasks
      tags:
        - Tasks
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [todo, in_progress, done]
        - in: query
          name: assignedTo
          schema:
            type: uuid
        - in: query
          name: priority
          schema:
            type: string
            enum: [low, medium, high]
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema: 
            type: integer
      responses:
        '200':
          description: Tasks list retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      tasks:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: uuid
                              example: task-uuid
                            title:
                              type: string
                              example: Test Task from Postman
                            description:
                              type: string
                              example: This is a test task created via Postman
                            status:
                              type: string
                              example: in_progress
                            priority:
